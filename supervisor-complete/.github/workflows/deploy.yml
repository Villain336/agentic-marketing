name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: supervisor-cluster

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            ecr_repo_secret: ECR_BACKEND_REPO
            ecs_service: supervisor-backend
          - service: webapp
            context: ./webapp
            dockerfile: ./webapp/Dockerfile
            ecr_repo_secret: ECR_WEBAPP_REPO
            ecs_service: supervisor-webapp
    outputs:
      backend-image: ${{ steps.output-image.outputs.backend-image }}
      webapp-image: ${{ steps.output-image.outputs.webapp-image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: image-tag
        run: |
          ECR_REPO="${{ secrets[matrix.ecr_repo_secret] }}"
          IMAGE_TAG="${{ github.sha }}"
          echo "full_image=${ECR_REPO}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "ecr_repo=${ECR_REPO}" >> "$GITHUB_OUTPUT"
          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.image-tag.outputs.full_image }}
            ${{ steps.image-tag.outputs.ecr_repo }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ secrets.DOMAIN }}/api

      - name: Output image URI
        id: output-image
        run: |
          echo "${{ matrix.service }}-image=${{ steps.image-tag.outputs.full_image }}" >> "$GITHUB_OUTPUT"

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition supervisor-backend \
            --query taskDefinition \
            > task-def.json

      - name: Update image in task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: backend
          image: ${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: supervisor-backend
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

  deploy-webapp:
    name: Deploy Webapp
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-backend]
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition supervisor-webapp \
            --query taskDefinition \
            > task-def.json

      - name: Update image in task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: webapp
          image: ${{ secrets.ECR_WEBAPP_REPO }}:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: supervisor-webapp
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-webapp]
    if: always()
    steps:
      - name: Deployment summary
        run: |
          if [ "${{ needs.deploy-backend.result }}" = "success" ] && [ "${{ needs.deploy-webapp.result }}" = "success" ]; then
            echo "::notice::Deployment successful. Commit: ${{ github.sha }}"
          else
            echo "::error::Deployment failed. Backend: ${{ needs.deploy-backend.result }}, Webapp: ${{ needs.deploy-webapp.result }}"
            exit 1
          fi
