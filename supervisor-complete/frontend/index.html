// ─── Supabase REST helpers ─────────────────────────────────────────────────────
const sbFetch = async (path, opts = {}, token = null) => {
  const headers = {
    "Content-Type":  "application/json",
    "apikey":        SB_ANON,
    "Authorization": token ? `Bearer ${token}` : `Bearer ${SB_ANON}`,
    ...opts.headers,
  };
  const res = await fetch(`${SB_URL}${path}`, { ...opts, headers });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err || `HTTP ${res.status}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : {};
};

// ─── Auth — direct Supabase endpoints, no edge function required ──────────────
const sbAuth = {
  signup: async (email, password, agencyName) => {
    // Sign up — Supabase returns user + session if email confirmation is OFF,
    // or just user (no access_token) if confirmation is ON.
    const data = await sbFetch("/auth/v1/signup", {
      method: "POST",
      body: JSON.stringify({ email, password, data: { agency_name: agencyName } }),
    });
    // Handle "User already registered"
    if (data.code === 422 || (data.msg && data.msg.toLowerCase().includes("already"))) {
      throw new Error("An account with this email already exists. Try logging in.");
    }
    if (data.error || data.error_description) {
      throw new Error(data.error_description || data.error || "Signup failed");
    }
    // If we got a session back (email confirm disabled), return it directly
    if (data.access_token) return data;
    // If we only got a user (email confirm ON), try to login anyway — 
    // we auto-confirmed via SQL so it should work
    if (data.user || data.id) {
      try {
        const session = await sbAuth.login(email, password);
        return session;
      } catch(e) {
        // Email confirmation still pending — tell the user clearly
        throw new Error("Account created! Check your email to confirm, then sign in.");
      }
    }
    throw new Error("Signup failed — please try again.");
  },
  login: async (email, password) => {
    const data = await sbFetch("/auth/v1/token?grant_type=password", {
      method: "POST",
      body: JSON.stringify({ email, password }),
    });
    if (data.error || data.error_description) {
      const msg = data.error_description || data.error || "Login failed";
      if (msg.toLowerCase().includes("confirm")) {
        throw new Error("Please check your email and confirm your account first.");
      }
      if (msg.toLowerCase().includes("invalid")) {
        throw new Error("Invalid email or password.");
      }
      throw new Error(msg);
    }
    return data;
  },
  logout: async (token) => {
    try { await sbFetch("/auth/v1/logout", { method: "POST" }, token); } catch {}
  },
};

// ─── Backend SSE stream ──────────────────────────────────────────────────────
const streamBackendAgent = async (agentId, biz, memory, { onText, onToolCall, onToolResult, onDone, onError }) => {
  const res = await fetch(`${API_URL}/agent/${agentId}/run`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      agent_id: agentId,
      business: { name: biz.name, service: biz.service, icp: biz.icp, geography: biz.geography, goal: biz.goal, brand_context: biz.brandCtx || "" },
      memory,
      tier: "standard",
    }),
  });
  if (!res.ok) throw new Error(`API ${res.status}: ${await res.text()}`);
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let finalOutput = "";
  let memoryUpdate = null;
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    for (const line of dec.decode(value).split("\n")) {
      if (!line.startsWith("data: ")) continue;
      try {
        const ev = JSON.parse(line.slice(6));
        if (ev.event === "think" && ev.content) { finalOutput = ev.content; onText?.(ev.content, ev.provider, ev.model); }
        else if (ev.event === "tool_call") { onToolCall?.(ev.tool_name, ev.tool_input); }
        else if (ev.event === "tool_result") { onToolResult?.(ev.tool_name, ev.tool_output); }
        else if (ev.event === "output") { finalOutput = ev.content; memoryUpdate = ev.memory_update; onDone?.(ev.content, ev.memory_update, ev.provider); }
        else if (ev.event === "error") { onError?.(ev.content); }
        else if (ev.event === "status") { onText?.(`⌁ ${ev.content}\n`, ev.provider, ev.model); }
      } catch {}
    }
  }
  return { output: finalOutput, memoryUpdate };
};

// ─── Legacy direct stream (fallback if backend unavailable) ──────────────────
const streamClaude = async (system, userContent, onChunk) => {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514", max_tokens: 4096, stream: true, system,
      messages: [{ role: "user", content: userContent }],
    }),
  });
  if (!res.ok) throw new Error(`API ${res.status}: ${await res.text()}`);
  const reader = res.body.getReader();
  const dec    = new TextDecoder();
  let full = "";
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    for (const line of dec.decode(value).split("\n")) {
      if (!line.startsWith("data: ")) continue;
      try { const d = JSON.parse(line.slice(6)); if (d.delta?.text) { full += d.delta.text; onChunk(full); } } catch {}
    }
  }
  return full;
};

// ─── Grading ──────────────────────────────────────────────────────────────────
const grade = (text) => {
  if (!text || text.length < 50) return { grade: "—", score: 0, words: 0, sections: 0 };
  const words    = text.trim().split(/\s+/).length;
  const sections = (text.match(/^##\s/gm) || []).length;
  const score    = Math.min(100, Math.round((words / 5) + (sections * 7)));
  const g = score >= 90 ? "A+" : score >= 80 ? "A" : score >= 70 ? "B+" : score >= 60 ? "B" : score >= 50 ? "C+" : "C";
  return { grade: g, score, words, sections };
};

  <div style={{height:3,borderRadius:2,flexShrink:0,width:i===cur?14:3,background:i===cur?"#7c3aed":i<cur?"rgba(167,139,250,0.4)":"rgba(255,255,255,0.08)",transition:"all .3s"}}/>
);
const Md = ({ text }) => {
  if (!text) return null;
  return <div>{text.split("\n").map((line,i)=>{
    if(line.startsWith("## "))  return <div key={i} className="md-h2">{line.slice(3)}</div>;
    if(line.startsWith("### ")) return <div key={i} className="md-h3">{line.slice(4)}</div>;
    if(line==="---")             return <hr  key={i} className="md-hr"/>;
    if(line==="")                return <div key={i} style={{height:5}}/>;
    if(/^\*\*[^*]+:\*\*/.test(line)) return <div key={i} className="md-kv" dangerouslySetInnerHTML={{__html:line.replace(/\*\*(.*?)\*\*/g,'<span style="color:#a78bfa">$1</span>')}}/>;
    if(line.startsWith("- ")||line.startsWith("* ")) return <div key={i} className="md-li"><span style={{position:"absolute",left:0,color:"rgba(124,58,237,0.8)"}}>·</span>{line.slice(2)}</div>;
    if(line.includes("**")) return <div key={i} className="md-p" dangerouslySetInnerHTML={{__html:line.replace(/\*\*(.*?)\*\*/g,'<span style="color:rgba(255,255,255,0.85);font-weight:600">$1</span>')}}/>;
    return <div key={i} className="md-p">{line}</div>;
  })}</div>;
};
const UploadZone = ({ docs, onAdd, onRemove, label }) => {
  const ref = useRef();
  const handle = async (files) => { for(const f of Array.from(files)){ const t=await f.text().catch(()=>""); onAdd({name:f.name,content:t}); } };
  return <div>
    <input ref={ref} type="file" multiple accept=".md,.txt,.csv" style={{display:"none"}} onChange={e=>handle(e.target.files)}/>
    <div onClick={()=>ref.current.click()} style={{border:"1px dashed rgba(167,139,250,0.2)",borderRadius:8,padding:"13px",textAlign:"center",cursor:"pointer",background:"rgba(124,58,237,0.02)",transition:"all .2s"}}
      onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(167,139,250,0.45)"}}
      onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(167,139,250,0.2)"}}>
      <div style={{fontSize:12,color:"rgba(255,255,255,0.25)",fontFamily:"'JetBrains Mono',monospace"}}>{label}</div>
      <div style={{fontSize:10,color:"rgba(255,255,255,0.15)",marginTop:3,fontFamily:"'JetBrains Mono',monospace"}}>.md · .txt · .csv</div>
    </div>
    {docs.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:7}}>{docs.map((d,i)=><span key={i} className="doc-chip" onClick={()=>onRemove(i)}>◈ {d.name.length>16?d.name.slice(0,14)+"…":d.name} ×</span>)}</div>}
  </div>;
};

  const [password, setPassword] = useState("");
  const [agency, setAgency]   = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState("");

  const handleSubmit = async () => {
    if (!email || !password) return setError("Email and password required");
    if (tab === "signup" && !agency) return setError("Agency name required");
    if (password.length < 8) return setError("Password must be at least 8 characters");
    setLoading(true); setError("");
    try {
      if (tab === "signup") {
        const session = await sbAuth.signup(email, password, agency);
        onSuccess({
          access_token: session.access_token,
          user: session.user,
          org_name: agency || session.user?.user_metadata?.agency_name || email.split("@")[0],
          plan: "trial",
        });
      } else {
        const session = await sbAuth.login(email, password);
        const orgName = session.user?.user_metadata?.agency_name || session.user?.email?.split("@")[0] || "Your Agency";
        onSuccess({
          access_token: session.access_token,
          user: session.user,
          org_name: orgName,
          plan: session.user?.user_metadata?.plan || "trial",
        });
      }
    } catch(e) { setError(e.message || "Something went wrong. Please try again."); }
    setLoading(false);
  };

  return (
    <div style={{minHeight:"100vh",background:"#0a0a0f",display:"flex",alignItems:"center",justifyContent:"center",padding:"32px",fontFamily:"'Outfit',sans-serif"}}>
      <div style={{position:"fixed",top:"40%",left:"50%",transform:"translate(-50%,-50%)",width:500,height:500,borderRadius:"50%",background:"radial-gradient(circle,rgba(124,58,237,0.1) 0%,transparent 70%)",pointerEvents:"none"}}/>
      <div style={{width:"100%",maxWidth:400,position:"relative",zIndex:2}} className="fu">
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:8,marginBottom:20}}>
            <span style={{color:"#7c3aed",fontFamily:"'JetBrains Mono',monospace",fontSize:16}}>◎</span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,letterSpacing:2,color:"rgba(255,255,255,0.4)",textTransform:"uppercase"}}>Supervisor</span>
          </div>
          <h2 style={{fontFamily:"'Instrument Serif',serif",fontSize:30,fontWeight:400,color:"#fafafa",marginBottom:6}}>
            {tab==="signup"?"Create your account":"Welcome back"}
          </h2>
          <p style={{fontSize:13,color:"rgba(255,255,255,0.35)"}}>
            {tab==="signup"?"Deploy your autonomous agency in 60 seconds":"Sign in to your autonomous agency"}
          </p>
        </div>

        <div style={{display:"flex",background:"rgba(255,255,255,0.04)",borderRadius:10,padding:4,marginBottom:28}}>
          {["signup","login"].map(t=>(
            <button key={t} onClick={()=>{setTab(t);setError("");}} style={{flex:1,padding:"9px",borderRadius:8,border:"none",background:tab===t?"rgba(124,58,237,0.3)":"transparent",color:tab===t?"#c4b5fd":"rgba(255,255,255,0.35)",fontSize:13,fontFamily:"'Outfit',sans-serif",fontWeight:600,cursor:"pointer",transition:"all .2s"}}>
              {t==="signup"?"Sign up":"Log in"}
            </button>
          ))}
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {tab==="signup"&&(
            <div>
              <label style={{fontSize:11,color:"rgba(255,255,255,0.3)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:1,textTransform:"uppercase",marginBottom:6,display:"block"}}>Agency name</label>
              <input className="sv-input" placeholder="Apex Growth Partners" value={agency} onChange={e=>setAgency(e.target.value)} autoFocus/>

          )}
          <div>
            <label style={{fontSize:11,color:"rgba(255,255,255,0.3)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:1,textTransform:"uppercase",marginBottom:6,display:"block"}}>Email</label>
            <input className="sv-input" type="email" placeholder="you@company.com" value={email} onChange={e=>setEmail(e.target.value)} autoFocus={tab==="login"}/>

          <div>

          {error&&<div style={{fontSize:12,color:"#f87171",fontFamily:"'JetBrains Mono',monospace",padding:"8px 12px",background:"rgba(248,113,113,0.08)",border:"1px solid rgba(248,113,113,0.2)",borderRadius:6}}>{error}</div>}
          <button className="sv-btn" style={{marginTop:4,fontSize:14,padding:"13px"}} onClick={handleSubmit} disabled={loading}>

  );

const Onboarding = ({ session, onComplete }) => {
  const [step, setStep]       = useState(0);

  const [biz, setBiz]         = useState({ name: session?.org_name || "" });
  const [brandDocs, setBrandDocs] = useState([]);
  const [provisioning, setProvisioning] = useState(false);
  const [provStep, setProvStep] = useState(0);

  const submit = async () => {
    if (!val.trim()) return;
    const updated = { ...biz, [SETUP_STEPS[step].key]: val.trim() };
    setBiz(updated);
    setVal("");
    if (step < SETUP_STEPS.length - 1) {
      setStep(s => s + 1);
    } else {
      setProvisioning(true);
      try { await sbData.saveAgencyProfile(session.access_token, updated); } catch {}
      for (let i = 0; i < SHELL.length; i++) {
        await new Promise(r => setTimeout(r, 400 + Math.random() * 350));
        setProvStep(i + 1);
      }
      await new Promise(r => setTimeout(r, 700));
      onComplete(updated, brandDocs);
    }
  };

  if (provisioning) return (

          <p style={{fontSize:12,color:"rgba(255,255,255,0.28)"}}>Provisioning 12 agents + 9 business systems…</p>

          <div style={{height:"100%",borderRadius:2,background:"linear-gradient(90deg,#7c3aed,#a78bfa)",width:`${(provStep/SHELL.length)*100}%`,transition:"width .45s cubic-bezier(.22,.68,0,1.2)"}}/>
        </div>
        <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,overflow:"hidden"}}>
          {SHELL.map((item,i)=>{
            const done=i<provStep;
            return <div key={item.id} className={`shell-row${done?" lit":""}`}>

// DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
const Dashboard = ({ session, biz, initialBrandDocs=[], onLogout }) => {
  const [agentOut, setAgentOut]       = useState({});
  const [agentSt, setAgentSt]         = useState({});
  const [agentPhases, setAgentPhases] = useState({});
  const [memory, setMemory]           = useState({});
  const [sel, setSel]                 = useState(AGENTS[0].id);
  const [running, setRunning]         = useState(false);
  const [log, setLog]                 = useState([]);
  const [trainOpen, setTrainOpen]     = useState(false);
  const [brandDocs, setBrandDocs]     = useState(initialBrandDocs);
  const [samples, setSamples]         = useState([]);
  const [campaignId, setCampaignId]   = useState(null);
  const [backendStatus, setBackendStatus] = useState("checking"); // checking | online | offline
  const [providerInfo, setProviderInfo]   = useState([]);
  const outRef    = useRef(null);
  const cancelRef = useRef(false);

  // Check backend health on mount and every 30s
  useEffect(()=>{
    const check = async () => {
      try {
        const r = await fetch(`${API_URL}/health`, { signal: AbortSignal.timeout(3000) });
        if (r.ok) {
          const d = await r.json();
          setBackendStatus("online");
          setProviderInfo(d.providers || []);
        } else { setBackendStatus("offline"); }
      } catch { setBackendStatus("offline"); }
    };
    check();
    const iv = setInterval(check, 30000);
    return ()=>clearInterval(iv);
  },[]);

  useEffect(()=>{
    const saved = loadCamp();
    if (saved?.agentOut) {
      setAgentOut(saved.agentOut);
      setAgentSt(saved.agentSt || {});
      setMemory(saved.memory || {});
      setLog(saved.log || []);
      setCampaignId(saved.campaignId || null);
    }
  },[]);

  useEffect(()=>{
    if (Object.keys(agentOut).length > 0) {
      saveCamp({ agentOut, agentSt, memory, log, campaignId, savedAt: Date.now() });
    }
  },[agentOut, agentSt, memory]);

  useEffect(()=>{ if(outRef.current) outRef.current.scrollTop=outRef.current.scrollHeight; },[agentOut]);

  const addLog = (msg) => setLog(l=>[...l.slice(-99),{msg,t:Date.now()}]);

  const buildBrandCtx = useCallback(()=>{
    let ctx = "";
    if(brandDocs.length){ctx+="\n\n=== BRAND DOCS ===\n";brandDocs.forEach(d=>{ctx+=`\n[${d.name}]\n${d.content.slice(0,1500)}\n`;})}
    if(samples.length){ctx+="\n\n=== TONE SAMPLES ===\n";samples.forEach(d=>{ctx+=`\n[${d.name}]\n${d.content.slice(0,1200)}\n`;})}
    return ctx;
  },[brandDocs,samples]);

  const runAgent = useCallback(async(agentId, currentMemory)=>{
    if(cancelRef.current) return currentMemory;
    const agent = AGENTS.find(a=>a.id===agentId);
    if(!agent) return currentMemory;

    setSel(agentId);
    setAgentSt(s=>({...s,[agentId]:"running"}));
    setAgentOut(o=>({...o,[agentId]:""}));
    setAgentPhases(p=>({...p,[agentId]:[]}));
    addLog(`▶ ${agent.label} started`);

    const fullMem = { ...currentMemory, ...biz, brandCtx: buildBrandCtx() };
    const startedAt = new Date().toISOString();

    try {
      // Try backend first, fall back to direct API
      let output = "";
      let extracted = {};
      let usedBackend = false;

      try {
        const healthRes = await fetch(`${API_URL}/health`, { signal: AbortSignal.timeout(3000) });
        if (healthRes.ok) usedBackend = true;
      } catch {}

      if (usedBackend) {
        // ── Backend agentic loop ──
        const result = await streamBackendAgent(agentId, biz, currentMemory, {
          onText: (text, provider, model) => {
            output = text;
            setAgentOut(o=>({...o,[agentId]:text}));
          },
          onToolCall: (toolName, toolInput) => {
            setAgentPhases(p=>({...p,[agentId]:[...(p[agentId]||[]),`⚡ ${toolName}(${JSON.stringify(toolInput).slice(0,60)}…)`]}));
            addLog(`  ↳ ${agent.label} → ${toolName}`);
          },
          onToolResult: (toolName, toolOutput) => {
            setAgentPhases(p=>({...p,[agentId]:[...(p[agentId]||[]),`✓ ${toolName} returned`]}));
          },
          onDone: (finalText, memUpdate, provider) => {
            output = finalText;
            extracted = memUpdate || {};
            addLog(`  ◎ ${agent.label} via ${provider || "backend"}`);
          },
          onError: (errMsg) => { throw new Error(errMsg); },
        });
        output = result.output;
        extracted = result.memoryUpdate || {};
      } else {
        // ── Fallback: direct API (legacy) ──
        let done = false;
        const phaseTimer = async()=>{
          for(let i=0;i<(agent.phases||[]).length;i++){
            if(done||cancelRef.current) break;
            await new Promise(r=>setTimeout(r,800+Math.random()*700));
            if(done) break;
            setAgentPhases(p=>({...p,[agentId]:[...(p[agentId]||[]),agent.phases[i]]}));
          }
        };
        phaseTimer();
        await streamClaude(agent.buildSystem(fullMem), agent.buildPrompt(fullMem), text=>{
          output = text;
          setAgentOut(o=>({...o,[agentId]:text}));
        });
        done = true;
        extracted = agent.extractMemory(output);
      }

      const nextMemory = {...currentMemory,...extracted};
      setMemory(nextMemory);
      setAgentSt(s=>({...s,[agentId]:"done"}));

      const g = grade(output);
      addLog(`✓ ${agent.label} — Grade: ${g.grade} · ${g.words} words${usedBackend?" [backend]":" [direct]"}`);

      if (session?.access_token) {
        await sbData.logAgentRun(session.access_token, campaignId, agentId, agent.label, output, startedAt);
      }

      return nextMemory;
    } catch(err) {
      setAgentSt(s=>({...s,[agentId]:"error"}));
      setAgentOut(o=>({...o,[agentId]:`## Error\n\n**${err.message}**\n\nBackend may be offline. Check server or API keys.`}));
      addLog(`✗ ${agent.label} failed: ${err.message.slice(0,80)}`);
      return currentMemory;
    }
  },[biz,buildBrandCtx,session,campaignId]);

  const runCampaign = async(startIdx)=>{
    if(running) return;
    const idx = (!startIdx||startIdx<0)?0:startIdx;
    cancelRef.current = false;
    setRunning(true);
    addLog(`◎ Campaign loop — ${AGENTS[idx].label} → ${AGENTS[AGENTS.length-1].label}`);
    let mem = {...memory};
    for(let i=idx;i<AGENTS.length;i++){
      if(cancelRef.current){addLog("⊘ Paused");break;}
      if(i>idx) await new Promise(r=>setTimeout(r,1000));
      mem = (await runAgent(AGENTS[i].id,mem))||mem;
    }
    if(!cancelRef.current) addLog("◆ Campaign complete — all agents finished");
    setRunning(false);
  };

  const pause = ()=>{cancelRef.current=true;setRunning(false);};

  const reset = ()=>{
    cancelRef.current=true;setRunning(false);
    setAgentOut({});setAgentSt({});setAgentPhases({});setMemory({});setLog([]);setCampaignId(null);
    wipeCamp();
  };

  const doneCount = Object.values(agentSt).filter(s=>s==="done").length;
  const selAgent  = AGENTS.find(a=>a.id===sel);
  const selSt     = sel?(agentSt[sel]||"idle"):"idle";
  const selOut    = sel?(agentOut[sel]||""):"";
  const selPhases = sel?(agentPhases[sel]||[]):[];
  const selGrade  = selSt==="done"?grade(selOut):null;
  const nextIdx   = AGENTS.findIndex(a=>!agentSt[a.id]||agentSt[a.id]==="idle"||agentSt[a.id]==="error");
  const btnLabel  = running?"Running…":doneCount===AGENTS.length?"↺ Re-run":doneCount===0?"▶ Run Full Campaign":`▶ Continue (${AGENTS[nextIdx<0?0:nextIdx]?.label})`;

  return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden",background:"#0a0a0f",fontFamily:"'Outfit',sans-serif"}}>
      <div style={{background:"#0d0d14",borderBottom:"1px solid rgba(255,255,255,0.06)",padding:"0 20px",display:"flex",alignItems:"center",justifyContent:"space-between",height:50,flexShrink:0,zIndex:30}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{color:"#7c3aed",fontFamily:"'JetBrains Mono',monospace",fontSize:13}}>◎</span>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:"rgba(255,255,255,0.3)",letterSpacing:2,textTransform:"uppercase"}}>Supervisor</span>
          <span style={{color:"rgba(255,255,255,0.08)"}}>·</span>
          <span style={{fontFamily:"'Instrument Serif',serif",fontSize:15,color:"rgba(255,255,255,0.8)"}}>{biz.name}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:doneCount===AGENTS.length?"#4ade80":"rgba(255,255,255,0.25)"}}>{doneCount}/{AGENTS.length} done</span>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,display:"flex",alignItems:"center",gap:4,color:backendStatus==="online"?"#4ade80":backendStatus==="offline"?"#f59e0b":"rgba(255,255,255,0.2)"}}>
            <span style={{width:5,height:5,borderRadius:"50%",background:backendStatus==="online"?"#4ade80":backendStatus==="offline"?"#f59e0b":"rgba(255,255,255,0.15)"}}/>
            {backendStatus==="online"?`engine · ${providerInfo.filter(p=>p.available).length} providers`:backendStatus==="offline"?"direct mode":"…"}
          </span>
          {session?.plan&&session.plan!=="trial"&&<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:"rgba(167,139,250,0.5)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:4,padding:"2px 7px",textTransform:"uppercase"}}>{session.plan}</span>}
          <button className="sv-ghost" onClick={()=>setTrainOpen(v=>!v)}>{trainOpen?"× close":"⬆ train"}</button>
          <button className="sv-ghost" style={{borderColor:"rgba(239,68,68,0.2)",color:"rgba(239,68,68,0.45)"}} onClick={reset}>reset</button>
          <a href="personas.html" target="_blank" className="sv-ghost" style={{textDecoration:"none",display:"inline-flex",alignItems:"center",gap:5}}>◈ first 100 users</a>
          <button className="sv-ghost" onClick={onLogout}>sign out</button>
        </div>
      </div>

      {trainOpen&&<div className="fi" style={{background:"#0d0d14",borderBottom:"1px solid rgba(255,255,255,0.06)",padding:"16px 20px",flexShrink:0}}>
        <div style={{maxWidth:800,margin:"0 auto"}}>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.2)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:3,textTransform:"uppercase",marginBottom:12}}>Agent training context — injected into every agent</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontFamily:"'JetBrains Mono',monospace",marginBottom:7}}>Brand docs · voice · positioning</div>
              <UploadZone docs={brandDocs} onAdd={d=>setBrandDocs(p=>[...p,d])} onRemove={i=>setBrandDocs(p=>p.filter((_,j)=>j!==i))} label="Drop .md or .txt brand files"/>
            </div>
            <div>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontFamily:"'JetBrains Mono',monospace",marginBottom:7}}>Sample posts · emails · convos</div>
              <UploadZone docs={samples} onAdd={d=>setSamples(p=>[...p,d])} onRemove={i=>setSamples(p=>p.filter((_,j)=>j!==i))} label="Drop examples that teach your tone"/>
            </div>
          </div>
          {(brandDocs.length+samples.length)>0&&<div style={{marginTop:10,padding:"8px 12px",background:"rgba(74,222,128,0.05)",border:"1px solid rgba(74,222,128,0.15)",borderRadius:7,fontSize:10,color:"rgba(74,222,128,0.8)",fontFamily:"'JetBrains Mono',monospace"}}>✓ {brandDocs.length+samples.length} file{brandDocs.length+samples.length!==1?"s":""} loaded — active on next agent run</div>}
        </div>
      </div>}

      <div style={{flex:1,display:"grid",gridTemplateColumns:"268px 1fr 200px",minHeight:0,overflow:"hidden"}}>
        {/* LEFT: pipeline */}
        <div style={{background:"#0d0d14",borderRight:"1px solid rgba(255,255,255,0.06)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{flex:1,overflowY:"auto",padding:"16px 14px"}}>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.18)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:3,textTransform:"uppercase",marginBottom:10}}>Campaign</div>
              {!running
                ?<button className="sv-btn" style={{width:"100%",fontSize:12,padding:"10px"}} onClick={()=>runCampaign(nextIdx<0?0:nextIdx)}>{btnLabel}</button>
                :<button onClick={pause} style={{width:"100%",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:8,padding:"10px",fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:"#f87171",cursor:"pointer",letterSpacing:.5,textTransform:"uppercase"}}>⊘ Pause</button>}
              {running&&<div style={{marginTop:8,fontSize:10,color:"rgba(167,139,250,0.7)",fontFamily:"'JetBrains Mono',monospace",display:"flex",alignItems:"center",gap:6}}><Spin size={9} color="#a78bfa"/> autonomous loop active</div>}
            </div>

            <div style={{marginBottom:16}}>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.18)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:3,textTransform:"uppercase",marginBottom:10}}>Agent Pipeline</div>
              {AGENTS.map((agent,idx)=>{
                const st=agentSt[agent.id]||"idle";
                const isSel=sel===agent.id,isDone=st==="done",isRun=st==="running",isSite=agent.id==="sitelaunch";
                return <div key={agent.id}>
                  <div className={`agent-tile${isRun?" active":""}${isDone?" done":""}${isSel&&!isRun?" sel":""} ${isSite?"sitelaunch":""}`} onClick={()=>setSel(agent.id)}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div style={{display:"flex",alignItems:"center",gap:9}}>
                        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:isDone?(isSite?"#4ade80":"#a78bfa"):isRun?(isSite?"#4ade80":"#a78bfa"):"rgba(255,255,255,0.22)",transition:"color .3s"}}>{agent.icon}</span>
                        <div>
                          <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.85)"}}>{agent.label}</div>
                          <div style={{fontSize:9,color:"rgba(255,255,255,0.22)",fontFamily:"'JetBrains Mono',monospace",marginTop:1}}>{agent.role}</div>
                        </div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        {isDone&&<div className={`grade-chip${isSite?" site":""}`}>{grade(agentOut[agent.id]).grade}</div>}
                        {isDone&&<Tick green={isSite}/>}
                        {isRun&&<Spin size={11} color={isSite?"#4ade80":"#a78bfa"}/>}
                        {st==="error"&&<span style={{fontSize:9,color:"#f87171",fontFamily:"'JetBrains Mono',monospace"}}>ERR</span>}
                      </div>
                    </div>
                    {isDone&&<div className="si" style={{marginTop:7,fontSize:9,color:"rgba(255,255,255,0.18)",fontFamily:"'JetBrains Mono',monospace",lineHeight:1.5}}>✓ {agent.handoff}</div>}
                    <button onClick={e=>{e.stopPropagation();runAgent(agent.id,memory);}} style={{marginTop:8,width:"100%",background:"transparent",border:`1px solid ${isRun?"transparent":isDone?"rgba(255,255,255,0.08)":isSite?"rgba(74,222,128,0.2)":"rgba(167,139,250,0.2)"}`,borderRadius:6,padding:"5px 0",fontSize:10,fontFamily:"'JetBrains Mono',monospace",letterSpacing:.5,textTransform:"uppercase",color:isRun?"rgba(255,255,255,0.2)":isDone?"rgba(255,255,255,0.2)":isSite?"rgba(74,222,128,0.6)":"rgba(167,139,250,0.6)",cursor:isRun?"not-allowed":"pointer"}}>
                      {isRun?"running…":isDone?"re-run":"run"}
                    </button>
                  </div>
                  {idx<AGENTS.length-1&&<div className={`connector ${isDone?"done":"idle"}`}/>}
                </div>;
              })}
            </div>

            <div>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.18)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:3,textTransform:"uppercase",marginBottom:8}}>Infrastructure</div>
              {SHELL.map(item=>(
                <div key={item.id} style={{display:"flex",alignItems:"center",gap:7,padding:"4px 4px"}}>
                  <span style={{fontSize:8,color:"rgba(74,222,128,0.5)",fontFamily:"'JetBrains Mono',monospace"}}>✓</span>
                  <span style={{fontSize:10,color:"rgba(255,255,255,0.22)"}}>{item.label}</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* CENTER: output */}
        <div style={{display:"flex",flexDirection:"column",overflow:"hidden",background:"#0a0a0f"}}>
          {selAgent&&<div style={{padding:"12px 20px",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:selAgent.id==="sitelaunch"?"#4ade80":"#a78bfa"}}>{selAgent.icon}</span>
              <span style={{fontSize:14,fontWeight:600,color:"#fafafa"}}>{selAgent.label}</span>
              <span style={{fontSize:9,color:"rgba(255,255,255,0.2)",fontFamily:"'JetBrains Mono',monospace"}}>{selAgent.role}</span>
              {selGrade&&<div className={`grade-chip${selAgent.id==="sitelaunch"?" site":""}`}>{selGrade.grade}</div>}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {selSt==="running"&&<span style={{fontSize:9,color:selAgent.id==="sitelaunch"?"#4ade80":"#a78bfa",fontFamily:"'JetBrains Mono',monospace",display:"flex",alignItems:"center",gap:5}}><Spin size={9} color={selAgent.id==="sitelaunch"?"#4ade80":"#a78bfa"}/> running</span>}
              {selSt==="done"&&<span style={{fontSize:9,color:"#4ade80",fontFamily:"'JetBrains Mono',monospace"}}>✓ complete</span>}
              {(selSt==="idle"||selSt==="error")&&!running&&<button className="sv-btn" style={{padding:"7px 16px",fontSize:11,background:selAgent.id==="sitelaunch"?"#16a34a":"#7c3aed"}} onClick={()=>runAgent(selAgent.id,memory)}>Run agent →</button>}
            </div>
          </div>}

          {selSt==="running"&&selPhases.length>0&&!selOut&&<div style={{padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,0.04)",background:"rgba(124,58,237,0.03)",flexShrink:0}}>
            {selPhases.map((ph,i)=>(
              <div key={i} className="phase-line ti" style={{animationDelay:`${i*.06}s`}}><Tick/> {ph}</div>
            ))}
            <div className="phase-line"><Spin size={11} color={selAgent?.id==="sitelaunch"?"#4ade80":"#a78bfa"}/><span style={{color:selAgent?.id==="sitelaunch"?"#4ade80":"#a78bfa"}}>Generating output…</span></div>
          </div>}

          <div ref={outRef} style={{flex:1,overflowY:"auto",padding:"20px 24px",minHeight:0}}>
            {selOut
              ?<Md text={selOut}/>
              :<div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,opacity:.4}}>
                <span style={{fontSize:24,fontFamily:"'JetBrains Mono',monospace",color:"rgba(255,255,255,0.2)"}}>{selAgent?.icon}</span>
                <span style={{fontSize:12,color:"rgba(255,255,255,0.25)",fontFamily:"'JetBrains Mono',monospace"}}>{selAgent?`${selAgent.label} standing by`:"Select an agent"}</span>
                {!running&&doneCount===0&&<span style={{fontSize:10,color:"rgba(255,255,255,0.15)",textAlign:"center",maxWidth:200,lineHeight:1.6}}>Press "Run Full Campaign" to start</span>}
              </div>}
          </div>

          {selSt==="done"&&selOut&&<div style={{padding:"9px 20px",borderTop:"1px solid rgba(255,255,255,0.05)",display:"flex",gap:18,alignItems:"center",flexShrink:0,background:"rgba(255,255,255,0.01)"}}>
            {[{l:"words",v:selGrade?.words},{l:"sections",v:selGrade?.sections},{l:"grade",v:selGrade?.grade}].map(s=>(
              <div key={s.l} style={{display:"flex",gap:5,alignItems:"baseline"}}>
                <span style={{fontFamily:"'Instrument Serif',serif",fontSize:17,color:"#a78bfa"}}>{s.v}</span>
                <span style={{fontSize:9,color:"rgba(255,255,255,0.2)",fontFamily:"'JetBrains Mono',monospace"}}>{s.l}</span>
              </div>
            ))}
            <div style={{flex:1}}/>
            <button className="sv-ghost" onClick={()=>navigator.clipboard?.writeText(selOut)}>copy</button>
          </div>}
        </div>

        {/* RIGHT: log + memory */}
        <div style={{background:"#0d0d14",borderLeft:"1px solid rgba(255,255,255,0.06)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{padding:"12px 14px",borderBottom:"1px solid rgba(255,255,255,0.05)",flexShrink:0}}>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.18)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:3,textTransform:"uppercase"}}>Supervisor Log</div>
          </div>
          <div style={{padding:"10px 12px",borderBottom:"1px solid rgba(255,255,255,0.05)",flexShrink:0}}>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.15)",fontFamily:"'JetBrains Mono',monospace",marginBottom:7}}>Campaign Memory</div>
            {MEM_KEYS.map(mk=>(
              <div key={mk.key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"3px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                <span style={{fontSize:9,color:"rgba(255,255,255,0.2)",fontFamily:"'JetBrains Mono',monospace"}}>{mk.label}</span>
                {memory[mk.key]
                  ?<span style={{fontSize:9,color:"#4ade80",fontFamily:"'JetBrains Mono',monospace"}}>✓ {mk.fmt(memory[mk.key])}</span>
                  :<span style={{fontSize:9,color:"rgba(255,255,255,0.1)",fontFamily:"'JetBrains Mono',monospace"}}>pending</span>}
              </div>
            ))}
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"10px 12px"}}>
            {log.length===0&&<div style={{fontSize:9,color:"rgba(255,255,255,0.1)",fontFamily:"'JetBrains Mono',monospace",textAlign:"center",marginTop:16}}>No activity yet</div>}
            {log.map((entry,i)=>(
              <div key={i} style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",padding:"4px 0",borderBottom:"1px solid rgba(255,255,255,0.03)",lineHeight:1.5,color:entry.msg.startsWith("✓")?"rgba(74,222,128,0.75)":entry.msg.startsWith("✗")?"rgba(248,113,113,0.75)":entry.msg.startsWith("◆")?"#a78bfa":entry.msg.startsWith("⊘")?"rgba(251,191,36,0.7)":"rgba(255,255,255,0.25)"}}>
                {entry.msg}
              </div>
            ))}
          </div>
          {doneCount>0&&<div style={{padding:"10px 12px",borderTop:"1px solid rgba(255,255,255,0.05)",flexShrink:0}}>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.15)",fontFamily:"'JetBrains Mono',monospace",marginBottom:7}}>Output Grades</div>
            {AGENTS.filter(a=>agentSt[a.id]==="done").map(a=>{
              const g=grade(agentOut[a.id]);
              return <div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"3px 0"}}>
                <span style={{fontSize:9,color:"rgba(255,255,255,0.28)",fontFamily:"'JetBrains Mono',monospace"}}>{a.label}</span>
                <span style={{fontFamily:"'Instrument Serif',serif",fontSize:14,color:a.id==="sitelaunch"?"#4ade80":"#a78bfa"}}>{g.grade}</span>
              </div>;
            })}
          </div>}
        </div>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════════════════════
function SupervisorApp() {
  const [screen, setScreen]     = useState("boot");
  const [session, setSession]   = useState(null);
  const [biz, setBiz]           = useState(null);
  const [brandDocs, setBrandDocs] = useState([]);
  const [preselect, setPreselect] = useState("growth");

  useEffect(()=>{
    const saved    = loadSession();
    const savedBiz = loadBiz();
    if (saved?.access_token && savedBiz?.name) {
      setSession(saved); setBiz(savedBiz); setScreen("dashboard");
    } else if (saved?.access_token) {
      setSession(saved); setScreen("subscribe");
    } else {
      setScreen("landing");
    }
  },[]);

  const handleAuthSuccess = (data) => {
    const sess = { access_token: data.access_token, user: data.user, org_name: data.org_name, plan: data.plan };
    setSession(sess);
    saveSession(sess);
    setScreen("subscribe");
  };

  const handlePlanSelected = (planId) => {
    const updated = { ...session, plan: planId };
    setSession(updated);
    saveSession(updated);
    setScreen("onboarding");
  };

  const handleOnboardingComplete = (bizProfile, docs) => {
    setBiz(bizProfile); setBrandDocs(docs);
    saveBiz(bizProfile);
    setScreen("dashboard");
  };

  const handleLogout = async () => {
    if (session?.access_token) await sbAuth.logout(session.access_token).catch(()=>{});
    clearSession();
    setSession(null); setBiz(null);
    setScreen("landing");
  };

  if (screen === "boot") return (
    <div style={{minHeight:"100vh",background:"#0a0a0f",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <Spin size={18} color="#7c3aed"/>
    </div>
  );

  return (
    <>
      <style>{CSS}</style>
      {screen==="landing"    && <Landing onGetStarted={(planId)=>{if(planId) setPreselect(planId); setScreen("auth");}} onLogin={()=>setScreen("auth")}/>}
      {screen==="auth"       && <AuthScreen onSuccess={handleAuthSuccess} onBack={()=>setScreen("landing")}/>}
      {screen==="subscribe"  && <SubscribePage session={session} preselect={preselect} onPlanSelected={handlePlanSelected} onSkip={()=>setScreen("onboarding")}/>}
      {screen==="onboarding" && <Onboarding session={session} onComplete={handleOnboardingComplete}/>}
      {screen==="dashboard"  && biz && <Dashboard session={session} biz={biz} initialBrandDocs={brandDocs} onLogout={handleLogout}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(SupervisorApp));
</script>
</body>
</html>
