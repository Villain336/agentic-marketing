*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Mono',monospace,monospace;background:#080810;color:#e2e2f0;font-size:13px;line-height:1.5}
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap');

/* Layout */
#app{min-height:100vh}
.hdr{background:#0c0c18;border-bottom:1px solid rgba(255,255,255,.06);padding:0 20px;height:48px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{color:#a78bfa;font-size:16px}
.logo-supe{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.3);text-transform:uppercase}
.logo-sep{color:rgba(255,255,255,.15)}
.logo-name{font-size:12px;color:rgba(255,255,255,.7);letter-spacing:1px}
nav{display:flex;gap:2px}
.nav-btn{background:none;border:none;cursor:pointer;font-family:inherit;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);padding:4px 10px;border-bottom:1.5px solid transparent;transition:all .15s}
.nav-btn.active{color:#a78bfa;border-bottom-color:#a78bfa}
.nav-btn:hover{color:rgba(255,255,255,.6)}
.body{max-width:1080px;margin:0 auto;padding:24px 20px}
.h1{font-size:22px;font-weight:400;color:#fafafa;margin-bottom:6px;letter-spacing:-.5px}
.sub{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:1.2px;text-transform:uppercase}
.hidden{display:none}

/* Cards & Pills */
.pill{border:1px solid rgba(255,255,255,.1);border-radius:100px;padding:4px 12px;font-size:11px;cursor:pointer;background:transparent;color:rgba(255,255,255,.4);transition:all .15s;font-family:inherit;letter-spacing:.5px}
.pill.active{border-color:rgba(167,139,250,.5);background:rgba(167,139,250,.15);color:#a78bfa}
.card{border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:14px 16px;background:rgba(255,255,255,.02);cursor:pointer;transition:all .18s}
.card:hover{border-color:rgba(255,255,255,.14);background:rgba(255,255,255,.04)}
.card.active{border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.06)}

/* Inputs */
input,textarea{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;font-size:13px;font-family:inherit;color:#e2e2f0;outline:none;resize:vertical;transition:border-color .2s}
input:focus,textarea:focus{border-color:rgba(167,139,250,.5)}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,.2)}

/* Buttons */
.btn{background:#7c3aed;color:#fff;border:1px solid #7c3aed;border-radius:7px;padding:9px 18px;font-size:11px;font-family:inherit;font-weight:500;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:#6d28d9}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-ghost{background:transparent;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:9px 18px;font-size:11px;font-family:inherit;font-weight:500;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .15s}
.btn-ghost:hover{border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.8)}

/* Tags */
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;letter-spacing:.5px;font-weight:500}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:12px;height:12px;border:1.5px solid rgba(167,139,250,.3);border-top-color:#a78bfa;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Progress */
.progress-track{height:2px;background:rgba(255,255,255,.06);border-radius:1px;overflow:hidden;margin-bottom:12px}
.progress-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#a78bfa);border-radius:1px;transition:width .4s ease}

/* Grid */
.grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-test{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:7px}
.grid-stat{display:grid;grid-template-columns:auto 1fr 1fr 1fr;gap:12px;align-items:center}
.grid-funnel{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* Persona card */
.persona-card{border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:14px 16px;background:rgba(255,255,255,.02);cursor:pointer;transition:all .18s}
.persona-card:hover{background:rgba(255,255,255,.04)}
.persona-card.selected{background:rgba(124,58,237,.06)}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.persona-name{font-size:13px;font-weight:500;color:#fafafa;margin-bottom:1px}
.persona-arch{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.5px}
.persona-role{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:8px}
.persona-fear{font-size:11px;font-style:italic;line-height:1.5;margin-bottom:10px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}

/* Results */
.score-ring{width:80px;height:80px;border-radius:50%;border:3px solid;display:flex;align-items:center;justify-content:center;flex-direction:column;flex-shrink:0}
.stat-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:14px 16px}
.stat-val{font-size:26px;font-weight:400;margin-bottom:4px}
.stat-lbl{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.8px;text-transform:uppercase}

/* Insights panel */
.insights-panel{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden;margin-bottom:24px}
.insights-hdr{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between}
.insights-body{padding:14px 16px;font-size:13px;color:rgba(255,255,255,.75);line-height:1.85;white-space:pre-wrap}
.insights-placeholder{color:rgba(255,255,255,.25);font-style:italic}

/* Scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

/* Bottom bar */
.bottom-bar{background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.2);border-radius:10px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:16px}

/* Response card */
.response-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:14px 16px}
.response-text{font-size:12px;color:rgba(255,255,255,.55);line-height:1.7}

/* Objection row */
.obj-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.obj-bar-track{width:48px;height:3px;background:rgba(255,255,255,.06);border-radius:1px}
.obj-bar-fill{height:100%;border-radius:1px;background:#f59e0b}

/* History */
.history-bar{display:flex;align-items:flex-end;gap:4px;height:60px;margin-bottom:20px;padding:0 4px}
.history-bar-item{flex:1;border-radius:2px 2px 0 0;opacity:.7;min-width:6px}
.history-entry{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:8px;margin-bottom:8px}
.history-score{width:40px;height:40px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;flex-shrink:0}
.empty-state{text-align:center;padding:60px 0;color:rgba(255,255,255,.2);font-size:12px;border:1px dashed rgba(255,255,255,.08);border-radius:10px}

/* Subject line results */
.subj-grade{width:64px;height:64px;border-radius:50%;border:3px solid;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:500;flex-shrink:0}
.subj-reaction{display:flex;gap:10px;align-items:flex-start;padding:8px 10px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:6px;margin-bottom:6px}
.open-tag{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;white-space:nowrap}

/* Chat */
.chat-msg{margin-bottom:12px;padding:10px 12px;border-radius:8px;border-left:2px solid}
.chat-msg-label{font-size:9px;color:rgba(255,255,255,.3);margin-bottom:5px;letter-spacing:1px;text-transform:uppercase}
.chat-msg-text{font-size:13px;color:rgba(255,255,255,.75);line-height:1.7}

/* Funnel */
.funnel-card{text-align:center;padding:12px 8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:8px}
.funnel-val{font-size:22px;font-weight:500;color:#a78bfa;margin-bottom:4px}
.funnel-lbl{font-size:10px;color:rgba(255,255,255,.35);line-height:1.5}

// ── API call (non-streaming) ───────────────────────────────
function callAPI(sys, msgs, onDone, onError) {
  var ctrl = new AbortController();
  var timer = setTimeout(function(){ctrl.abort();}, BATCH_TIMEOUT);
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    signal: ctrl.signal,
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({model:MODEL, max_tokens:400, stream:false, system:sys, messages:msgs}),
  }).then(function(res) {
    clearTimeout(timer);
    if (!res.ok) {
      res.text().then(function(b){
        onError(res.status === 429 ? 'Rate limited — wait 30s and retry' : 'API ' + res.status + ': ' + b.slice(0,80));
      });
      return;
    }
    res.json().then(function(d){
      var txt = d && d.content && d.content[0] && d.content[0].text;
      if (!txt) { onError('Empty response'); return; }
      onDone(txt);
    }).catch(function(e){onError(e.message);});
  }).catch(function(e){
    clearTimeout(timer);
    onError(e.name === 'AbortError' ? 'Timed out' : e.message);
  });
}

// ── API call (streaming) ───────────────────────────────────
function callStream(sys, msgs, onChunk, onDone, onError) {
  var ctrl = new AbortController();
  var timer = setTimeout(function(){ctrl.abort();}, CHAT_TIMEOUT);
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    signal: ctrl.signal,
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({model:MODEL, max_tokens:600, stream:true, system:sys, messages:msgs}),
  }).then(function(res) {
    clearTimeout(timer);
    if (!res.ok) {
      res.text().then(function(b){
        onError(res.status === 429 ? 'Rate limited — wait 30s and retry' : 'API ' + res.status + ': ' + b.slice(0,80));
      });
      return;
    }
    var reader = res.body.getReader();
    var dec = new TextDecoder();
    var buf = '';
    var txt = '';
    function pump() {
      reader.read().then(function(chunk) {
        if (chunk.done) {
          reader.cancel();
          if (!txt) { onError('Empty response'); return; }
          onDone(txt);
          return;
        }
        buf += dec.decode(chunk.value, {stream:true});
        var lines = buf.split('\n');
        buf = lines.pop() || '';
        for (var i=0; i<lines.length; i++) {
          if (!lines[i].startsWith('data: ')) continue;
          var raw = lines[i].slice(6).trim();
          if (!raw || raw === '[DONE]') continue;
          try {
            var d = JSON.parse(raw);
            if (d.type === 'content_block_delta' && d.delta && d.delta.type === 'text_delta' && d.delta.text) {
              txt += d.delta.text;
              onChunk(txt);
            }
          } catch(e2){}
        }
        pump();
      }).catch(function(e){
        reader.cancel();
        onError(e.name === 'AbortError' ? 'Timed out' : e.message);
      });
    }
    pump();
  }).catch(function(e){
    clearTimeout(timer);
    onError(e.name === 'AbortError' ? 'Timed out' : e.message);
  });
}

// ── Analysis ───────────────────────────────────────────────
function analyze(text) {
  var t = text.toLowerCase();
  var sentiment = 'neutral';
  var pos = ['love','great','yes','definitely','interested','impressive','exactly','forward','start','book'];
  var neg = ['not interested','pass','expensive','doubt',"won't","can't","don't think"];
  var skep = ['but','however','concern','not sure','depends','question','though'];
  var ps = pos.filter(function(w){return t.indexOf(w)>-1;}).length;
  var ns = neg.filter(function(w){return t.indexOf(w)>-1;}).length;
  var ss = skep.filter(function(w){return t.indexOf(w)>-1;}).length;
  if (ps > ns && ps > ss) sentiment = 'positive';
  else if (ns > ps) sentiment = 'negative';
  else if (ss > 0) sentiment = 'skeptical';

  var intent = 'unknown';
  if (/let'?s move|next steps|how do we start|sign up|try it|book a call/.test(t)) intent = 'buy';
  else if (/not for us|not right now|won'?t work|can'?t justify|pass/.test(t)) intent = 'pass';
  else if (/think about|look into|check with|send me|learn more|tell me more/.test(t)) intent = 'researching';
  else if (sentiment === 'positive') intent = 'interested';
  else if (sentiment === 'negative') intent = 'not_interested';

  var objs = [];
  if (/price|cost|expensive|budget|afford/.test(t)) objs.push('Price / budget');
  if (/time|busy|bandwidth|capacity/.test(t)) objs.push('Time / bandwidth');
  if (/proof|evidence|case study|reference|trust/.test(t)) objs.push('Needs social proof');
  if (/team|stakeholder|check with|approval|legal/.test(t)) objs.push('Internal buy-in required');
  if (/already use|current solution|switching|competitor/.test(t)) objs.push('Has existing solution');
  if (/technical|api|integration|security|compliance/.test(t)) objs.push('Technical / compliance');

  var qs = (text.match(/[^.!]*\?/g)||[]).map(function(q){return q.trim();}).filter(function(q){return q.length>10;});
  return {sentiment:sentiment, intent:intent, objections:objs, questions:qs.slice(0,3)};
}

function sentColor(s) {
  return s==='positive'?'#10b981':s==='negative'?'#ef4444':s==='skeptical'?'#f59e0b':'#6b7280';
}
function intentLabel(i) {
  return i==='buy'?'Buy signal':i==='pass'?'Hard pass':i==='researching'?'Still evaluating':i==='interested'?'Interested':i==='not_interested'?'Not interested':'Neutral';
}
function intentColor(i) {
  return i==='buy'?'#10b981':i==='pass'?'#ef4444':'#94a3b8';
}
function scoreColor(s) {
  return s>=65?'#10b981':s>=40?'#f59e0b':'#ef4444';
}

// ── Render helpers ─────────────────────────────────────────
function h(tag, attrs, children) {
  var el = document.createElement(tag);
  if (attrs) {
    Object.keys(attrs).forEach(function(k) {
      if (k === 'onClick') el.addEventListener('click', attrs[k]);
      else if (k === 'onInput') el.addEventListener('input', attrs[k]);
      else if (k === 'onKeydown') el.addEventListener('keydown', attrs[k]);
      else if (k === 'onChange') el.addEventListener('change', attrs[k]);
      else if (k === 'style') Object.assign(el.style, attrs[k]);
      else if (k === 'class') el.className = attrs[k];
      else el.setAttribute(k, attrs[k]);
    });
  }
  if (children) {
    if (Array.isArray(children)) {
      children.forEach(function(c) {
        if (c === null || c === undefined) return;
        if (typeof c === 'string' || typeof c === 'number') el.appendChild(document.createTextNode(c));
        else el.appendChild(c);
      });
    } else if (typeof children === 'string' || typeof children === 'number') {
      el.appendChild(document.createTextNode(children));
    } else {
      el.appendChild(children);
    }
  }
  return el;
}

function tag(txt, color) {
  return h('span', {class:'tag', style:{background:color+'18',color:color,border:'1px solid '+color+'33'}}, txt);
}

function pill(label, active, onClick) {

}

}

  return el;

// ── Batch logic ────────────────────────────────────────────
var localBatchResults = {};
var cancelBatch = false;

function runOne(persona, onComplete) {
  var sys = systemPrompt(persona, state.market);
  var prompt = testPrompt(state.testType, state.stimulus);
  var prev = state.histories[persona.id] || [];
  var msgs = prev.concat([{role:'user', content:prompt}]);
  state.running = persona.id;
  state.results[persona.id] = {text:'', analysis:null, loading:true};
  render();
  callAPI(sys, msgs, function(text) {
    var a = analyze(text);
    state.results[persona.id] = {text:text, analysis:a, loading:false};
    state.histories[persona.id] = msgs.concat([{role:'assistant',content:text}]);
    state.running = null;
    render();
    onComplete({text:text, analysis:a, ok:true});
  }, function(err) {
    state.results[persona.id] = {text:'Error: '+err, analysis:{sentiment:'neutral',intent:'unknown',objections:[],questions:[]}, loading:false};
    state.running = null;
    render();
    onComplete({text:'Error: '+err, ok:false});
  });
}

function runBatch() {
  if (!state.stimulus.trim() || state.selected.length === 0) return;
  cancelBatch = false;
  state.batching = true;
  state.batchPct = 0;
  state.results = {};
  state.insights = null;
  state.insLoading = false;
  localBatchResults = {};
  var personas = PERSONAS.filter(function(p){return state.selected.indexOf(p.id) > -1;});
  render();

  function next(i) {
    if (i >= personas.length || cancelBatch) {
      state.batching = false;
      state.view = 'results';
      render();
      generateInsights(localBatchResults);
      return;
    }
    var p = personas[i];
    runOne(p, function(result) {
      localBatchResults[p.id] = result;
      state.batchPct = Math.round(((i+1)/personas.length)*100);
      if (cancelBatch) {
        state.batching = false;
        state.view = 'results';
        render();
        return;
      }
      setTimeout(function(){next(i+1);}, 2000);
    });
  }
  next(0);
}

function generateInsights(batchResults) {
  var done = Object.keys(batchResults).filter(function(id){
    return batchResults[id].analysis && batchResults[id].text.indexOf('Error:') !== 0;
  });
  if (done.length === 0) return;
  state.insLoading = true;
  render();
  var tl = (TEST_TYPES.find(function(t){return t.id===state.testType;})||{}).label || state.testType;
  var responses = done.map(function(id){
    var p = PERSONAS.find(function(a){return a.id===id;});
    return (p ? p.name + ' (' + p.archetype + ')' : id) + ': ' + batchResults[id].text;
  }).join('\n\n');
  var prompt = 'You are a brutal honest product advisor. A founder ran a "' + tl + '" test.\n\nWHAT WAS TESTED:\n"' + state.stimulus.slice(0,600) + '"\n\nPERSONA RESPONSES:\n' + responses + '\n\nGive the founder exactly what to fix. Structure as:\n\n**The core problem in one sentence.**\n\n**What is working** (2-3 bullets only if something genuinely resonated)\n\n**What to fix — by priority**\nFor each fix: specific problem, which personas surfaced it, concrete rewrite or change. Not improve your value prop — show the better version.\n\n**The objection to neutralize first**\nSingle most damaging objection and specific script to handle it.\n\n**One thing to test next**\nSpecific small experiment to validate the fix.\n\nUnder 400 words. No fluff. No great start energy.';
  callAPI(
    'You are a direct experienced product advisor. Never generic. Always actionable.',
    [{role:'user',content:prompt}],
    function(text){state.insights = text; state.insLoading = false; render();},
    function(e){state.insights = 'Could not generate insights: '+e; state.insLoading = false; render();}
  );
}

function runChat(persona, message) {
  var sys = systemPrompt(persona, state.market);
  var prev = state.histories[persona.id] || [];
  var msgs = prev.concat([{role:'user',content:message}]);
  state.running = persona.id;
  state.results[persona.id] = {text:'', analysis:null, loading:true};
  state.histories[persona.id] = msgs;
  render();
  callStream(sys, msgs,
    function(chunk){state.results[persona.id] = {text:chunk, analysis:null, loading:true}; render();},
    function(text){
      var a = analyze(text);
      state.results[persona.id] = {text:text, analysis:a, loading:false};
      state.histories[persona.id] = msgs.concat([{role:'assistant',content:text}]);
      state.running = null;
      render();
    },
    function(err){
      state.results[persona.id] = {text:'Error: '+err, analysis:null, loading:false};
      state.running = null;
      render();
    }
  );
}

function runSubjectLine() {
  if (!state.subjectLine.trim() || state.selected.length === 0) return;
  state.subjectRunning = true;
  state.subjectResults = null;
  render();
  var personas = PERSONAS.filter(function(p){return state.selected.indexOf(p.id)>-1;});
  var prompt = 'You just received an email with this subject line:\n\n"' + state.subjectLine + '"\n\nAnswer only:\n1. Would you open this email? (yes / no / maybe)\n2. If you opened it, would you reply? (yes / no / maybe)\n3. In one sentence, why?';
  var pending = personas.length;
  var reactions = [];
  var opens = 0; var maybeOpens = 0; var replies = 0;

  personas.forEach(function(p) {
    callAPI(systemPrompt(p, state.market), [{role:'user',content:prompt}], function(text) {
      var t = text.toLowerCase();
      var wo = (t.indexOf('yes')>-1 && t.indexOf('open')>-1) ? 'yes' : (t.indexOf('maybe')>-1 && t.indexOf('open')>-1) ? 'maybe' : 'no';
      var wr = (t.indexOf('yes')>-1 && (t.indexOf('reply')>-1||t.indexOf('respond')>-1)) ? 'yes' : 'no';
      if (wo==='yes') opens++;
      if (wo==='maybe') maybeOpens++;
      if (wr==='yes') replies++;
      reactions.push({persona:p, text:text, open:wo, reply:wr});
      pending--;
      if (pending === 0) finishSubject();
    }, function(){
      pending--;
      if (pending === 0) finishSubject();
    });
  });

  function finishSubject() {
    var total = reactions.length;
    var openRate = total > 0 ? Math.round(((opens + maybeOpens*0.4)/total)*100) : 0;
    var replyRate = total > 0 ? Math.round((replies/total)*100) : 0;
    var grade = openRate>=60?'A':openRate>=40?'B':openRate>=25?'C':'D';
    state.subjectResults = {openRate:openRate, replyRate:replyRate, grade:grade, reactions:reactions, total:total};
    state.subjectRunning = false;
    render();
  }
}

// ── Summary calculation ────────────────────────────────────
function calcSummary() {
  var done = Object.keys(state.results).filter(function(id){return state.results[id].analysis;});
  if (!done.length) return null;
  var sentCount = {positive:0, negative:0, skeptical:0, neutral:0};
  var intCount = {};
  var objMap = {};
  var allQ = [];
  done.forEach(function(id) {
    var a = state.results[id].analysis;
    sentCount[a.sentiment] = (sentCount[a.sentiment]||0) + 1;
    intCount[a.intent] = (intCount[a.intent]||0) + 1;
    a.objections.forEach(function(o){objMap[o]=(objMap[o]||0)+1;});
    allQ = allQ.concat(a.questions);
  });
  var total = done.length;
  var posRate = Math.round((sentCount.positive/total)*100);
  var buyRate = Math.round(((intCount.buy||0)/total)*100);
  var fitScore = Math.round(posRate*0.4 + buyRate*0.6);
  var topObjs = Object.keys(objMap).map(function(k){return [k,objMap[k]];}).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
  var uq = [];
  allQ.forEach(function(q){if(uq.indexOf(q)<0)uq.push(q);});
  return {sentCount:sentCount, intCount:intCount, topObjs:topObjs, allQ:uq.slice(0,8), posRate:posRate, buyRate:buyRate, fitScore:fitScore, total:total};
}

function calcConfidence(summary) {
  if (!summary) return null;
  return {
    reachRate: Math.min(Math.round(65 + summary.posRate*0.15), 95),
    openRate:  Math.min(Math.round(summary.posRate*0.55 + summary.buyRate*0.3), 70),
    replyRate: Math.min(Math.round(summary.buyRate*0.6 + ((summary.intCount.researching||0)/summary.total)*20), 35),
    meetRate:  Math.min(Math.round(summary.buyRate*0.4), 20),
  };
}

        if (idx > -1) state.selected.splice(idx,1);
        else state.selected.push(p.id);
        render();
      }
    });

    // Header row
    var hdrRow = h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'10px'}});
    var leftSide = h('div', {style:{display:'flex',gap:'10px',alignItems:'center'}});
    leftSide.appendChild(h('div', {class:'avatar', style:{background:p.color+'22',border:'1px solid '+p.color+'44',color:p.color}}, p.initials));
    leftSide.appendChild(h('div', null, [
      h('div', {class:'persona-name'}, p.name),
      h('div', {class:'persona-arch'}, p.archetype),
    ]));
    hdrRow.appendChild(leftSide);
    var rightSide = h('div', {style:{display:'flex',alignItems:'center',gap:'5px'}});
    if (state.running === p.id) rightSide.appendChild(spinner());
    if (isSel && state.running !== p.id) rightSide.appendChild(dot(p.color));
    if (r && r.analysis) rightSide.appendChild(tag(r.analysis.sentiment, sentColor(r.analysis.sentiment)));
    hdrRow.appendChild(rightSide);
    card.appendChild(hdrRow);

    card.appendChild(h('div', {class:'persona-role'}, p.title + ' · ' + p.company));
    card.appendChild(h('div', {class:'persona-fear', style:{color:p.color+'99'}}, 'Fear: "' + p.fear.slice(0,55) + '..."'));
    var tagsRow = h('div', {style:{display:'flex',gap:'4px'}});
    tagsRow.appendChild(tag(p.personality, 'rgba(255,255,255,.4)'));
    tagsRow.appendChild(tag(p.authority, 'rgba(255,255,255,.4)'));
    card.appendChild(tagsRow);

    if (r && r.analysis) {
      var resultRow = h('div', {style:{marginTop:'10px',paddingTop:'10px',borderTop:'1px solid rgba(255,255,255,.05)',display:'flex',gap:'6px',alignItems:'center'}});
      resultRow.appendChild(tag(intentLabel(r.analysis.intent), intentColor(r.analysis.intent)));
      if (r.analysis.objections[0]) resultRow.appendChild(h('span', {style:{fontSize:'10px',color:'rgba(255,255,255,.3)'}}, '· ' + r.analysis.objections[0]));
      card.appendChild(resultRow);
    }
    grid.appendChild(card);
  });
  body.appendChild(grid);

  // Bottom bar
  var bar = h('div', {class:'bottom-bar'});
  bar.appendChild(h('div', null, [
    h('div', {style:{fontSize:'12px',color:'rgba(255,255,255,.6)',marginBottom:'3px'}},
      state.selected.length === 0 ? 'Select personas above to begin' : state.selected.length + ' persona' + (state.selected.length!==1?'s':'') + ' selected'),
    h('div', {class:'sub'}, (MARKETS.find(function(m){return m.id===state.market;})||{}).label + ' context active'),
  ]));
  var btns = h('div', {style:{display:'flex',gap:'8px'}});
  btns.appendChild(btn('Select all', function(){state.selected=PERSONAS.map(function(p){return p.id;});render();}, true));
  var cfgBtn = btn('Configure test →', function(){if(state.selected.length>0){state.view='test';render();}}, false, state.selected.length===0);
  btns.appendChild(cfgBtn);
  bar.appendChild(btns);
  body.appendChild(bar);
}

// ── Test view ──────────────────────────────────────────────
function renderTest(app) {
  var body = h('div', {class:'body'});
  app.appendChild(body);

  body.appendChild(h('div', {style:{marginBottom:'24px',animation:'fadeUp .3s ease'}}, [
    h('div', {class:'h1'}, 'Configure your test.'),
    h('div', {class:'sub'}, state.selected.length + ' persona' + (state.selected.length!==1?'s':'') + ' · ' + (MARKETS.find(function(m){return m.id===state.market;})||{}).label),
  ]));

  // Test type grid
  body.appendChild(h('div', {style:{marginBottom:'20px'}}, [
    h('div', {class:'sub', style:{marginBottom:'10px'}}, 'What are you testing?'),
    h('div', {class:'grid-test'}, TEST_TYPES.map(function(t) {
      return h('div', {class:'card'+(state.testType===t.id?' active':''), onClick:function(){state.testType=t.id;render();}}, [
        h('div', {style:{fontSize:'12px',fontWeight:'500',color:'rgba(255,255,255,.85)',marginBottom:'2px'}}, t.label),
        h('div', {style:{fontSize:'10px',color:'rgba(255,255,255,.3)'}}, t.hint),
      ]);
    })),
  ]));

  // Stimulus
  var stimDiv = h('div', {style:{marginBottom:'20px'}});
  stimDiv.appendChild(h('div', {class:'sub', style:{marginBottom:'10px'}}, state.testType==='subject_line' ? 'Your subject line' : 'Your stimulus'));
  if (state.testType === 'subject_line') {
    var inp = h('input', {placeholder:'e.g. quick question about your Q4 pipeline'});
    inp.value = state.subjectLine;
    inp.addEventListener('input', function(){state.subjectLine = inp.value;});
    stimDiv.appendChild(inp);
    stimDiv.appendChild(h('div', {style:{fontSize:'11px',color:'rgba(255,255,255,.3)',marginTop:'8px',lineHeight:'1.6'}},
      'Tests whether each persona would open and reply. Returns open rate, reply rate, and grade.'));
  } else {
    var ta = h('textarea', {placeholder:(TEST_TYPES.find(function(t){return t.id===state.testType;})||{}).hint||'Enter your stimulus', style:{minHeight:'140px'}});
    ta.value = state.stimulus;
    ta.addEventListener('input', function(){state.stimulus = ta.value;});
    stimDiv.appendChild(ta);
  }
  body.appendChild(stimDiv);

  // Mode selector
  body.appendChild(h('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'24px'}},
    [['batch','Batch — run all selected'],['chat','Chat — conversation with one']].map(function(item) {
      return h('div', {class:'card'+(state.mode===item[0]?' active':''), onClick:function(){state.mode=item[0];render();}},
        h('div', {style:{fontSize:'11px',fontWeight:'500',color:state.mode===item[0]?'#a78bfa':'rgba(255,255,255,.6)',letterSpacing:'.5px'}}, item[1]));
    })
  ));

  // Chat mode
  if (state.mode === 'chat') {
    var chatDiv = h('div', {style:{marginBottom:'20px'}});
    chatDiv.appendChild(h('div', {class:'sub', style:{marginBottom:'10px'}}, 'Select a persona to chat with'));
    var chatBtns = h('div', {style:{display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'16px'}});
    PERSONAS.filter(function(p){return state.selected.indexOf(p.id)>-1;}).forEach(function(p) {
      var b = h('button', {
        class: 'btn-ghost',
        style: {borderColor:p.color+'55'},
        onClick: function(){state.activeChat=p;render();}
      });
      b.appendChild(h('span', {style:{color:p.color}}, p.initials));
      b.appendChild(document.createTextNode(' ' + p.name));
      chatBtns.appendChild(b);
    });
    chatDiv.appendChild(chatBtns);

    if (state.activeChat) {
      var p = state.activeChat;
      var chatBox = h('div', {style:{background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.07)',borderRadius:'10px',padding:'16px'}});

      // Chat header
      var chatHdr = h('div', {style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'14px',paddingBottom:'12px',borderBottom:'1px solid rgba(255,255,255,.05)'}});
      chatHdr.appendChild(h('div', {class:'avatar', style:{width:'32px',height:'32px',background:p.color+'22',border:'1px solid '+p.color+'44',color:p.color}}, p.initials));
      chatHdr.appendChild(h('div', null, [
        h('div', {style:{fontSize:'13px',fontWeight:'500',color:'#fafafa'}}, p.name),
        h('div', {style:{fontSize:'10px',color:'rgba(255,255,255,.3)'}}, p.archetype + ' · ' + (MARKETS.find(function(m){return m.id===state.market;})||{}).label),
      ]));
      if (state.running === p.id) chatHdr.appendChild(spinner());
      chatBox.appendChild(chatHdr);

      // Messages
      var hist = state.histories[p.id] || [];
      hist.forEach(function(msg) {
        var msgEl = h('div', {class:'chat-msg', style:{background:msg.role==='user'?'rgba(124,58,237,.08)':'rgba(255,255,255,.02)',borderLeftColor:msg.role==='user'?'#7c3aed':p.color,marginBottom:'12px'}});
        msgEl.appendChild(h('div', {class:'chat-msg-label'}, msg.role==='user'?'You':p.name));
        msgEl.appendChild(h('div', {class:'chat-msg-text'}, msg.content));
        chatBox.appendChild(msgEl);
      });

      // Streaming response
      var r = state.results[p.id];
      if (r && r.loading) {
        var streamEl = h('div', {class:'chat-msg', style:{background:'rgba(255,255,255,.02)',borderLeftColor:p.color,animation:'pulse 2s ease infinite',marginBottom:'12px'}});
        streamEl.appendChild(h('div', {class:'chat-msg-label'}, p.name.toUpperCase()));
        streamEl.appendChild(h('div', {class:'chat-msg-text'}, r.text || 'Thinking...'));
        chatBox.appendChild(streamEl);
      }

      // Chat input
      var inputRow = h('div', {style:{display:'flex',gap:'8px',marginTop:'12px'}});
      var ci = h('input', {placeholder:'Talk to ' + p.name + '...'});
      ci.value = state.chatInput;
      ci.addEventListener('input', function(){state.chatInput=ci.value;});
      ci.addEventListener('keydown', function(e){
        if (e.key==='Enter' && state.chatInput.trim() && !state.running) {
          var msg = state.chatInput.trim();
          state.chatInput = '';
          runChat(p, msg);
        }
      });
      inputRow.appendChild(ci);
      inputRow.appendChild(btn('Send', function(){
        if (state.chatInput.trim() && !state.running) {
          var msg = state.chatInput.trim();
          state.chatInput = '';
          runChat(p, msg);
        }
      }, false, !!state.running));
      chatBox.appendChild(inputRow);

      if (state.stimulus.trim() && !hist.length) {
        chatBox.appendChild(btn('Send configured stimulus as first message', function(){
          runChat(p, testPrompt(state.testType, state.stimulus));
        }, true));
      }
      chatDiv.appendChild(chatBox);
    }
    body.appendChild(chatDiv);
  }

  // Batch run / subject line button
  if (state.mode === 'batch') {
    if (state.testType === 'subject_line') {
      var sjBtn = btn(
        state.subjectRunning ? 'Testing...' : 'Test subject line — ' + state.selected.length + ' personas',
        function(){if(!state.subjectRunning){runSubjectLine();state.view='history';render();}},
        false,
        !state.subjectLine.trim() || state.selected.length===0 || state.subjectRunning
      );
      sjBtn.style.width = '100%';
      sjBtn.style.justifyContent = 'center';
      sjBtn.style.padding = '13px';
      body.appendChild(sjBtn);
    } else if (!state.batching) {
      var runBtn = btn('Run batch — ' + state.selected.length + ' personas', runBatch, false, !state.stimulus.trim() || state.selected.length===0);
      runBtn.style.width = '100%';
      runBtn.style.justifyContent = 'center';
      runBtn.style.padding = '13px';
      body.appendChild(runBtn);
    } else {
      var progDiv = h('div', {style:{background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'10px',padding:'20px'}});
      var track = h('div', {class:'progress-track'});
      track.appendChild(h('div', {class:'progress-fill', style:{width:state.batchPct+'%'}}));
      progDiv.appendChild(track);
      var progRow = h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center'}});
      var progLeft = h('div', {style:{display:'flex',gap:'8px',alignItems:'center',fontSize:'11px',color:'rgba(167,139,250,.7)'}});
      progLeft.appendChild(spinner());
      progLeft.appendChild(document.createTextNode('Running ' + state.batchPct + '% complete...'));
      progRow.appendChild(progLeft);
      progRow.appendChild(btn('Stop', function(){cancelBatch=true;}, true));
      progDiv.appendChild(progRow);
      body.appendChild(progDiv);
    }
  }
}

// ── Results view ───────────────────────────────────────────
function renderResults(app) {
  var body = h('div', {class:'body'});
  app.appendChild(body);
  var summary = calcSummary();
  var conf = calcConfidence(summary);

  if (!summary) {
    var empty = h('div', {class:'empty-state'});
    empty.appendChild(h('div', {style:{fontSize:'32px',marginBottom:'12px'}}, '◈'));
    empty.appendChild(h('div', {class:'sub'}, 'No results yet — run a batch test first'));
    empty.appendChild(h('br'));
    empty.appendChild(btn('Go to test →', function(){state.view='test';render();}));
    body.appendChild(empty);
    return;
  }

  body.appendChild(h('div', {style:{marginBottom:'24px',animation:'fadeUp .3s ease'}}, [
    h('div', {class:'h1'}, 'Market fit analysis.'),
    h('div', {class:'sub'}, summary.total + ' personas · ' + (MARKETS.find(function(m){return m.id===state.market;})||{}).label),
  ]));

  // Score row
  var sc = scoreColor(summary.fitScore);
  var scoreRow = h('div', {class:'grid-stat', style:{marginBottom:'24px'}});
  var ring = h('div', {class:'score-ring', style:{borderColor:sc+'44'}});
  ring.appendChild(h('span', {style:{fontSize:'28px',color:sc,fontWeight:'400',lineHeight:'1'}}, summary.fitScore+''));
  ring.appendChild(h('span', {style:{fontSize:'9px',color:'rgba(255,255,255,.3)',letterSpacing:'1px',textTransform:'uppercase',marginTop:'3px'}}, 'fit score'));
  scoreRow.appendChild(ring);
  [{label:'Positive reaction',val:summary.posRate+'%',color:'#10b981'},
   {label:'Buy signal',val:summary.buyRate+'%',color:'#a78bfa'},
   {label:'Researching more',val:Math.round(((summary.intCount.researching||0)/summary.total)*100)+'%',color:'#94a3b8'},
  ].forEach(function(s) {
    var sc2 = h('div', {class:'stat-card'});
    sc2.appendChild(h('div', {class:'stat-val', style:{color:s.color}}, s.val));
    sc2.appendChild(h('div', {class:'stat-lbl'}, s.label));
    scoreRow.appendChild(sc2);
  });
  body.appendChild(scoreRow);

  // Insights
  var ins = h('div', {class:'insights-panel'});
  var insHdr = h('div', {class:'insights-hdr'});
  insHdr.appendChild(h('div', {class:'sub'}, 'What to fix — AI synthesis'));
  var insRight = h('div', {style:{display:'flex',alignItems:'center',gap:'8px'}});
  if (state.insLoading) {
    insRight.appendChild(spinner());
    insRight.appendChild(h('span', {style:{fontSize:'11px',color:'rgba(167,139,250,.6)'}}, 'Analyzing...'));
  } else if (state.insights) {
    insRight.appendChild(btn('Regenerate', function(){generateInsights(state.results);}, true));
  }
  insHdr.appendChild(insRight);
  ins.appendChild(insHdr);
  var insBody = h('div', {class:'insights-body'});
  if (!state.insights && !state.insLoading) {
    insBody.appendChild(h('span', {class:'insights-placeholder'}, 'Insights generate automatically after batch run.'));
  } else if (state.insights) {
    insBody.appendChild(document.createTextNode(state.insights));
  }
  ins.appendChild(insBody);
  body.appendChild(ins);

  // Objections + Questions
  var twoCol = h('div', {class:'grid-2', style:{marginBottom:'24px'}});

  var objPanel = h('div', {style:{background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.06)',borderRadius:'10px',padding:'16px'}});
  objPanel.appendChild(h('div', {class:'sub', style:{marginBottom:'12px'}}, 'Top objections raised'));
  if (!summary.topObjs.length) {
    objPanel.appendChild(h('div', {style:{fontSize:'11px',color:'rgba(255,255,255,.25)',fontStyle:'italic'}}, 'No major objections raised'));
  } else {
    summary.topObjs.forEach(function(item) {
      var row = h('div', {class:'obj-row'});
      row.appendChild(h('div', {style:{flex:'1',fontSize:'12px',color:'rgba(255,255,255,.6)'}}, item[0]));
      var barWrap = h('div', {style:{display:'flex',alignItems:'center',gap:'6px'}});
      var track2 = h('div', {class:'obj-bar-track'});
      var fill = h('div', {class:'obj-bar-fill', style:{width:((item[1]/summary.total)*100)+'%'}});
      track2.appendChild(fill);
      barWrap.appendChild(track2);
      barWrap.appendChild(h('span', {style:{fontSize:'10px',color:'#f59e0b',minWidth:'24px'}}, item[1]+'/'+summary.total));
      row.appendChild(barWrap);
      objPanel.appendChild(row);
    });
  }
  twoCol.appendChild(objPanel);

  var qPanel = h('div', {style:{background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.06)',borderRadius:'10px',padding:'16px'}});
  qPanel.appendChild(h('div', {class:'sub', style:{marginBottom:'12px'}}, 'Questions they asked'));
  if (!summary.allQ.length) {
    qPanel.appendChild(h('div', {style:{fontSize:'11px',color:'rgba(255,255,255,.25)',fontStyle:'italic'}}, 'No questions captured'));
  } else {
    summary.allQ.forEach(function(q) {
      qPanel.appendChild(h('div', {style:{fontSize:'11px',color:'rgba(255,255,255,.55)',padding:'6px 0',borderBottom:'1px solid rgba(255,255,255,.04)',lineHeight:'1.5'}}, '"' + q + '"'));
    });
  }
  twoCol.appendChild(qPanel);
  body.appendChild(twoCol);

  // Confidence funnel
  if (conf) {
    var funnelSection = h('div', {style:{background:'rgba(167,139,250,.05)',border:'1px solid rgba(167,139,250,.15)',borderRadius:'10px',padding:'16px',marginBottom:'24px'}});
    funnelSection.appendChild(h('div', {class:'sub', style:{marginBottom:'12px'}}, 'Estimated real-world funnel'));
    var funnelGrid = h('div', {class:'grid-funnel'});
    [{label:'Would see outreach',val:conf.reachRate+'%'},
     {label:'Would open cold email',val:conf.openRate+'%'},
     {label:'Would reply',val:conf.replyRate+'%'},
     {label:'Would take a meeting',val:conf.meetRate+'%'},
    ].forEach(function(f) {
      var fc = h('div', {class:'funnel-card'});
      fc.appendChild(h('div', {class:'funnel-val'}, f.val));
      fc.appendChild(h('div', {class:'funnel-lbl'}, f.label));
      funnelGrid.appendChild(fc);
    });
    funnelSection.appendChild(funnelGrid);
    funnelSection.appendChild(h('div', {style:{fontSize:'11px',color:'rgba(255,255,255,.25)',marginTop:'10px',lineHeight:'1.6'}},
      'Directional estimates derived from persona sentiment and intent — not guarantees. Use as relative benchmark.'));
    body.appendChild(funnelSection);
  }

  // Individual responses
  body.appendChild(h('div', {class:'sub', style:{marginBottom:'12px'}}, 'Individual responses'));
  var resList = h('div', {style:{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'24px'}});
  PERSONAS.filter(function(p){return state.results[p.id] && state.results[p.id].analysis;}).forEach(function(p) {
    var r = state.results[p.id];
    var a = r.analysis;
    var card = h('div', {class:'response-card'});
    var row = h('div', {style:{display:'flex',gap:'12px',alignItems:'flex-start'}});
    row.appendChild(h('div', {class:'avatar', style:{width:'32px',height:'32px',background:p.color+'22',border:'1px solid '+p.color+'44',color:p.color,flexShrink:'0'}}, p.initials));
    var info = h('div', {style:{flex:'1'}});
    var nameRow = h('div', {style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'}});
    nameRow.appendChild(h('span', {style:{fontSize:'13px',fontWeight:'500',color:'#fafafa'}}, p.name));
    nameRow.appendChild(tag(a.sentiment, sentColor(a.sentiment)));
    nameRow.appendChild(tag(intentLabel(a.intent), intentColor(a.intent)));
    info.appendChild(nameRow);
    info.appendChild(h('div', {class:'response-text'}, r.text.slice(0,220) + (r.text.length>220?'...':'')));
    if (a.objections.length) {
      var objRow2 = h('div', {style:{marginTop:'6px',display:'flex',gap:'4px',flexWrap:'wrap'}});
      a.objections.forEach(function(o){objRow2.appendChild(tag('⚠ '+o,'#f59e0b'));});
      info.appendChild(objRow2);
    }
    row.appendChild(info);
    row.appendChild(btn('Chat →', function(){state.activeChat=p;state.mode='chat';state.view='test';render();}, true));
    card.appendChild(row);
    resList.appendChild(card);
  });
  body.appendChild(resList);

  var btmRow = h('div', {style:{display:'flex',gap:'10px'}});
  btmRow.appendChild(btn('Run another test', function(){state.view='test';state.results={};state.histories={};render();}, true));
  btmRow.appendChild(btn('Save & back to panel', function(){var s=calcSummary();if(s)saveHistory(s);state.view='panel';render();}));
  body.appendChild(btmRow);
}

// ── History view ───────────────────────────────────────────
function renderHistory(app) {
  var body = h('div', {class:'body'});
  app.appendChild(body);

  body.appendChild(h('div', {style:{marginBottom:'24px',animation:'fadeUp .3s ease'}}, [
    h('div', {class:'h1'}, 'Test history.'),
    h('div', {class:'sub', style:{marginBottom:'10px'}}, 'Track how your market fit score evolves over iterations'),
  ]));

  // Subject line tester
  var sjSection = h('div', {style:{marginBottom:'28px',background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'10px',padding:'20px'}});
  sjSection.appendChild(h('div', {class:'sub', style:{marginBottom:'10px'}}, 'Subject line open rate estimator'));
  var sjRow = h('div', {style:{display:'flex',gap:'8px',marginBottom:'12px'}});
  var sjInp = h('input', {placeholder:'e.g. quick question about your Q4 pipeline', style:{flex:'1'}});
  sjInp.value = state.subjectLine;
  sjInp.addEventListener('input', function(){state.subjectLine=sjInp.value;});
  sjInp.addEventListener('keydown', function(e){if(e.key==='Enter'&&!state.subjectRunning)runSubjectLine();});
  sjRow.appendChild(sjInp);
  sjRow.appendChild(btn(state.subjectRunning?'Testing...':'Test →', function(){if(!state.subjectRunning)runSubjectLine();}, false, !state.subjectLine.trim()||state.subjectRunning||state.selected.length===0));
  sjSection.appendChild(sjRow);
  if (state.selected.length===0) sjSection.appendChild(h('div', {style:{fontSize:'11px',color:'#f59e0b'}}, 'Select personas in Panel first'));

  if (state.subjectResults) {
    var sr = state.subjectResults;
    var gradeColor = sr.grade==='A'?'#10b981':sr.grade==='B'?'#a78bfa':sr.grade==='C'?'#f59e0b':'#ef4444';
    var sjScoreRow = h('div', {style:{display:'grid',gridTemplateColumns:'auto 1fr 1fr',gap:'12px',marginBottom:'14px',alignItems:'center'}});
    var gradeEl = h('div', {class:'subj-grade', style:{borderColor:gradeColor+'44',color:gradeColor}}, sr.grade);
    sjScoreRow.appendChild(gradeEl);
    [{label:'Estimated open rate',val:sr.openRate+'%'},{label:'Estimated reply rate',val:sr.replyRate+'%'}].forEach(function(s) {
      var sc3 = h('div', {class:'stat-card'});
      sc3.appendChild(h('div', {class:'stat-val', style:{color:'#a78bfa',fontSize:'22px'}}, s.val));
      sc3.appendChild(h('div', {class:'stat-lbl'}, s.label));
      sjScoreRow.appendChild(sc3);
    });
    sjSection.appendChild(sjScoreRow);
    sr.reactions.forEach(function(rx) {
      var rxEl = h('div', {class:'subj-reaction'});
      rxEl.appendChild(h('div', {class:'avatar', style:{width:'22px',height:'22px',background:rx.persona.color+'22',color:rx.persona.color,fontSize:'8px',flexShrink:'0'}}, rx.persona.initials));
      rxEl.appendChild(h('div', {style:{flex:'1',fontSize:'11px',color:'rgba(255,255,255,.55)',lineHeight:'1.6'}}, rx.text.slice(0,160)));
      var oc = rx.open==='yes'?'#10b981':rx.open==='maybe'?'#f59e0b':'#ef4444';
      rxEl.appendChild(h('span', {class:'open-tag', style:{background:oc+'18',color:oc,border:'1px solid '+oc+'33'}}, rx.open==='yes'?'Opens':rx.open==='maybe'?'Maybe':'Ignores'));
      sjSection.appendChild(rxEl);
    });
  }
  body.appendChild(sjSection);

  // Score trend
  if (state.testHistory.length > 0) {
    body.appendChild(h('div', {class:'sub', style:{marginBottom:'12px'}}, 'Fit score over time — ' + state.testHistory.length + ' test' + (state.testHistory.length!==1?'s':'')));

    // Bar chart
    var barEl = h('div', {class:'history-bar'});
    state.testHistory.slice(0,20).slice().reverse().forEach(function(entry) {
      var c = scoreColor(entry.fitScore);
      var bar = h('div', {class:'history-bar-item', style:{height:((entry.fitScore/100)*100)+'%',background:c}});
      barEl.appendChild(bar);
    });
    body.appendChild(barEl);

    // Entries
    state.testHistory.forEach(function(entry) {
      var c = scoreColor(entry.fitScore);
      var el = h('div', {class:'history-entry'});
      el.appendChild(h('div', {class:'history-score', style:{borderColor:c+'44',color:c}}, entry.fitScore+''));
      var info = h('div', {style:{flex:'1'}});
      var typeRow = h('div', {style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'3px'}});
      typeRow.appendChild(h('span', {style:{fontSize:'12px',fontWeight:'500',color:'#fafafa'}}, (TEST_TYPES.find(function(t){return t.id===entry.testType;})||{}).label||entry.testType));
      typeRow.appendChild(h('span', {style:{fontSize:'10px',color:'rgba(255,255,255,.3)',background:'rgba(255,255,255,.05)',padding:'1px 6px',borderRadius:'4px'}}, (MARKETS.find(function(m){return m.id===entry.market;})||{}).label||entry.market));
      info.appendChild(typeRow);
      info.appendChild(h('div', {style:{fontSize:'11px',color:'rgba(255,255,255,.4)',lineHeight:'1.5'}}, '"'+entry.stimulus+'"'));
      if (entry.topObjs && entry.topObjs.length) {
        var objsRow = h('div', {style:{marginTop:'4px',display:'flex',gap:'4px',flexWrap:'wrap'}});
        entry.topObjs.forEach(function(o){objsRow.appendChild(tag('⚠ '+o,'#f59e0b'));});
        info.appendChild(objsRow);
      }
      el.appendChild(info);
      var metaCol = h('div', {style:{textAlign:'right',flexShrink:'0'}});
      metaCol.appendChild(h('div', {style:{fontSize:'10px',color:'rgba(255,255,255,.3)'}}, new Date(entry.date).toLocaleDateString()));
      metaCol.appendChild(h('div', {style:{fontSize:'10px',color:'#10b981',marginTop:'2px'}}, entry.posRate+'% positive'));
      metaCol.appendChild(h('div', {style:{fontSize:'10px',color:'#a78bfa'}}, entry.buyRate+'% buy signal'));
      el.appendChild(metaCol);
      body.appendChild(el);
    });

    body.appendChild(h('br'));
    body.appendChild(btn('Clear history', function(){state.testHistory=[];render();}, true));
  } else {
    body.appendChild(h('div', {class:'empty-state'}, 'No test history yet. Run a batch test and click "Save & back to panel" to start tracking.'));
  }
}

// ── Boot ───────────────────────────────────────────────────
render();
</script>
</body>
</html>
